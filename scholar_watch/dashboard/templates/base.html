<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scholar Watch{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('dashboard.static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('dashboard.index') }}" class="navbar-brand">Scholar Watch</a>
        <ul class="navbar-nav">
            <li><a href="{{ url_for('dashboard.index') }}">Researchers</a></li>
            <li><a href="{{ url_for('dashboard.compare') }}">Compare</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('dashboard.static', filename='js/dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
