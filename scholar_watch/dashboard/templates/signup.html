{% extends "base.html" %}

{% block title %}Scholar Watch - Sign Up{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h1 class="auth-title">Create Account</h1>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('dashboard.signup') }}">
            <div class="form-group">
                <label for="display_name">Display Name</label>
                <input type="text" id="display_name" name="display_name" required
                       value="{{ request.form.get('display_name', '') }}"
                       placeholder="Your name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       value="{{ request.form.get('email', '') }}"
                       placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       minlength="8" placeholder="At least 8 characters">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       minlength="8" placeholder="Confirm your password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{{ url_for('dashboard.login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
