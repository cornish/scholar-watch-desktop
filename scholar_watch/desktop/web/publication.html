<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publication - Scholar Watch</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="/eel.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Scholar Watch</a>
        <ul class="navbar-nav">
            <li><a href="index.html">My Scholars</a></li>
            <li><a href="compare.html">Compare</a></li>
            <li>
                <a href="notifications.html" class="nav-notifications" id="nav-notif-link">
                    &#128276;<span class="notification-badge" id="notif-badge" style="display:none;"></span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="container">
        <div id="content"><p>Loading...</p></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const pubId = parseInt(params.get("id"), 10);

        async function loadPublication() {
            if (!pubId) {
                document.getElementById("content").innerHTML = '<p>No publication specified.</p>';
                return;
            }

            const data = await eel.get_publication_detail(pubId)();
            if (data.error) {
                document.getElementById("content").innerHTML = '<p>' + escapeHtml(data.error) + '</p>';
                return;
            }

            const pub = data.publication;
            document.title = pub.title + " - Scholar Watch";

            let html = '<h1 class="page-title">' + escapeHtml(pub.title) + '</h1>';

            html += '<p style="color: var(--gray-500); margin-top: -1rem; margin-bottom: 1rem;">';
            if (data.researcher) {
                html += 'By <a href="researcher.html?id=' + encodeURIComponent(data.researcher.scholar_id) + '">' +
                    escapeHtml(data.researcher.name) + '</a>';
            }
            if (pub.year) html += ' &middot; ' + pub.year;
            if (pub.venue) html += ' &middot; ' + escapeHtml(pub.venue);
            html += '</p>';

            if (pub.authors) {
                html += '<p style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--gray-700);">' +
                    escapeHtml(pub.authors) + '</p>';
            }

            html += '<div class="card chart-container"><div id="chart-pub"></div></div>';

            html += '<div class="card"><h2 class="card-title">Citation History</h2>';
            html += '<div class="table-wrapper"><table><thead><tr><th>Date</th><th>Citation Count</th></tr></thead><tbody>';
            for (const snap of data.snapshots) {
                html += '<tr><td>' + escapeHtml(snap.date) + '</td><td>' + snap.citation_count + '</td></tr>';
            }
            html += '</tbody></table></div></div>';

            document.getElementById("content").innerHTML = html;
            renderChart("chart-pub", data.chart);
        }

        loadPublication();
        updateNotifBadge();
    </script>
</body>
</html>
