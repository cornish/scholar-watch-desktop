<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Researchers - Scholar Watch</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="/eel.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Scholar Watch</a>
        <ul class="navbar-nav">
            <li><a href="index.html">My Scholars</a></li>
            <li><a href="compare.html" class="active">Compare</a></li>
            <li>
                <a href="notifications.html" class="nav-notifications" id="nav-notif-link">
                    &#128276;<span class="notification-badge" id="notif-badge" style="display:none;"></span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Compare Researchers</h1>

        <div class="card">
            <div class="checkbox-list" id="researcher-checkboxes" style="margin-bottom: 1rem;">
                <p>Loading researchers...</p>
            </div>
            <button class="btn btn-primary" onclick="doCompare()">Compare</button>
        </div>

        <div id="compare-chart" style="display:none;" class="card chart-container">
            <div id="chart-compare"></div>
        </div>

        <div id="compare-table"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allResearchers = [];

        async function loadResearchers() {
            allResearchers = await eel.get_all_researchers()();
            const container = document.getElementById("researcher-checkboxes");
            if (!allResearchers || allResearchers.length === 0) {
                container.innerHTML = '<p>No researchers to compare.</p>';
                return;
            }
            let html = '';
            for (const r of allResearchers) {
                html += '<label><input type="checkbox" name="compare-id" value="' + r.id + '"> ' +
                    escapeHtml(r.name || r.scholar_id) + '</label>';
            }
            container.innerHTML = html;
        }

        async function doCompare() {
            const checked = document.querySelectorAll('input[name="compare-id"]:checked');
            const ids = Array.from(checked).map(cb => parseInt(cb.value, 10));
            if (ids.length < 2) {
                alert("Select at least 2 researchers to compare.");
                return;
            }

            const data = await eel.get_comparison_data(ids)();

            // Chart
            const chartDiv = document.getElementById("compare-chart");
            chartDiv.style.display = "block";
            renderChart("chart-compare", data.chart);

            // Table
            if (data.data && data.data.length) {
                let html = '<div class="card"><div class="table-wrapper"><table><thead><tr>' +
                    '<th>Researcher</th><th>Citations</th><th>h-index</th><th>i10-index</th>' +
                    '<th>Publications</th><th>Velocity</th><th>Acceleration</th></tr></thead><tbody>';
                for (const item of data.data) {
                    const m = item.metrics;
                    const accClass = m.citation_acceleration > 0 ? 'delta-positive' :
                        (m.citation_acceleration < 0 ? 'delta-negative' : '');
                    html += '<tr>';
                    html += '<td><a href="researcher.html?id=' + encodeURIComponent(item.researcher.scholar_id) + '">' +
                        escapeHtml(item.researcher.name) + '</a></td>';
                    html += '<td>' + m.total_citations + '</td>';
                    html += '<td>' + m.h_index + '</td>';
                    html += '<td>' + m.i10_index + '</td>';
                    html += '<td>' + m.num_publications + '</td>';
                    html += '<td>' + m.citation_velocity.toFixed(3) + '</td>';
                    html += '<td class="' + accClass + '">' + m.citation_acceleration.toFixed(4) + '</td>';
                    html += '</tr>';
                }
                html += '</tbody></table></div></div>';
                document.getElementById("compare-table").innerHTML = html;
            }
        }

        loadResearchers();
        updateNotifBadge();
    </script>
</body>
</html>
